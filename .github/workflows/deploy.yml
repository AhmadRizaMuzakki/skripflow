name: Deploy Laravel via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Build frontend assets
        run: |
          npm install --no-audit --no-fund
          npm run build
          test -f public/build/manifest.json

      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy application via SSH
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd $HOME/skripflow
            git pull origin main
            git restore public/ 2>/dev/null || git checkout HEAD -- public/
            mkdir -p public/build
            composer install --no-dev --optimize-autoloader --no-interaction
            php artisan storage:link 2>/dev/null || true
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          EOF

      - name: Upload public directory to server
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "mkdir -p $HOME/skripflow/public $HOME/public_html"
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} -r public/. ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$HOME/skripflow/public/
          scp -i ~/.ssh/id_rsa -P ${{ secrets.SSH_PORT }} -r public/. ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$HOME/public_html/
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            if [ ! -L $HOME/public_html/storage ]; then
              rm -rf $HOME/public_html/storage
              ln -s $HOME/skripflow/storage/app/public $HOME/public_html/storage
            fi
          EOF
