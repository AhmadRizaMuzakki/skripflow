name: Deploy Laravel via SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH Connection
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Execute Deployment Commands via SSH
        run: |
          ssh -i ~/.ssh/id_rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            # 1. Masuk ke folder core Laravel (skripflow)
            cd $HOME/skripflow

            # 2. Tarik update kode terbaru dari GitHub
            git pull origin main

            # 3. Sinkronisasi folder public ke public_html
            rm -rf public/storage
            cp -r public/* $HOME/public_html/
            rm -rf public

            # 4. Memastikan symlink storage di public_html tetap aman menuju skripflow
            if [ ! -L $HOME/public_html/storage ]; then
              rm -rf $HOME/public_html/storage
              ln -s $HOME/skripflow/storage/app/public $HOME/public_html/storage
            fi

            # 5. Install dependensi composer
            composer install --no-dev --optimize-autoloader --no-interaction

            # 6. Jalankan migrasi database otomatis
            php artisan migrate --force

            # Compile aset Vite langsung di server setelah ditarik dari GitHub
            npm install
            npm run build
            cp -r public/build $HOME/public_html/build

            # 7. Bersihkan dan perbarui cache Laravel
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          EOF
